<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>寻境大庆 · AR扫描</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;background:#0d0805;color:#f4e8d0;min-height:100vh;overflow-x:hidden}
:root{--gold:#b8953a;--red:#8b2635;--paper:#f4e8d0;--gray:#8a7e6b}

/* Header */
.header{text-align:center;padding:1.2rem 1rem .8rem;background:linear-gradient(180deg,#1a0f0a,#0d0805)}
.header h1{font-size:1.4rem;color:var(--gold);letter-spacing:.2rem}
.header p{font-size:.78rem;color:var(--gray);margin-top:.3rem}

/* Scanner */
.scanner{position:relative;width:100%;max-width:400px;margin:1rem auto;aspect-ratio:3/4;background:#000;border-radius:12px;overflow:hidden;border:2px solid var(--gold)}
.scanner video{width:100%;height:100%;object-fit:cover}
.scanner canvas{display:none}
.scan-overlay{position:absolute;inset:0;pointer-events:none}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;aspect-ratio:3/4;border:3px solid var(--gold);border-radius:8px;box-shadow:0 0 30px rgba(184,149,58,.3)}
.scan-line{position:absolute;top:0;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:scanMove 2.5s ease-in-out infinite}
@keyframes scanMove{0%,100%{top:10%}50%{top:85%}}
.scan-hint{position:absolute;bottom:12%;left:0;right:0;text-align:center;color:var(--gold);font-size:.82rem;font-weight:600;text-shadow:0 0 10px rgba(0,0,0,.8);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* No camera fallback */
.no-cam{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:1.5rem;text-align:center}
.no-cam p{color:var(--gray);font-size:.85rem;line-height:1.8;margin-bottom:1rem}

/* Cards */
.cards{padding:0 1rem 1rem}
.cards-title{color:var(--gold);font-size:.9rem;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.card-grid{display:flex;flex-direction:column;gap:.6rem}
.ar-card{background:linear-gradient(135deg,rgba(244,232,208,.06),rgba(244,232,208,.02));border:2px solid var(--gray);border-radius:10px;padding:.8rem;display:flex;gap:.8rem;align-items:center;transition:all .3s;cursor:pointer}
.ar-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.ar-card.scanned{border-color:#4caf50;background:rgba(76,175,80,.08)}
.ar-card-img{width:64px;height:64px;border-radius:6px;object-fit:cover;border:2px solid var(--gold);flex-shrink:0}
.ar-card-info{flex:1;min-width:0}
.ar-card-name{color:var(--gold);font-weight:700;font-size:.85rem;margin-bottom:.2rem}
.ar-card-desc{color:var(--gray);font-size:.72rem;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ar-card-status{font-size:.72rem;font-weight:700;flex-shrink:0}
.ar-card-status.pending{color:var(--gray)}
.ar-card-status.done{color:#4caf50}

/* Sync code */
.sync-section{padding:0 1rem 1.5rem}
.sync-box{background:rgba(184,149,58,.08);border:2px solid var(--gold);border-radius:10px;padding:1rem;text-align:center}
.sync-label{color:var(--gold);font-weight:700;font-size:.9rem;margin-bottom:.6rem}
.sync-code{background:#000;border:2px solid var(--gold);border-radius:8px;padding:.7rem;font-family:monospace;font-size:1.3rem;color:#4caf50;letter-spacing:.2rem;word-break:break-all;min-height:2.5rem;display:flex;align-items:center;justify-content:center}
.sync-empty{color:var(--gray);font-size:.85rem;font-family:'Noto Serif SC',serif;letter-spacing:.05rem}
.sync-copy{margin-top:.6rem;padding:.5rem 1.5rem;background:var(--gold);color:#1a0f0a;border:none;border-radius:6px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.sync-copy:hover{transform:scale(1.03);opacity:.9}
.sync-copy:disabled{opacity:.4;cursor:default;transform:none}
.sync-hint{color:var(--gray);font-size:.72rem;margin-top:.5rem;line-height:1.6}

/* Manual scan button */
.manual-scan{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-top:.6rem}
.manual-btn{padding:.35rem .7rem;background:rgba(184,149,58,.12);border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:.78rem;font-family:inherit;cursor:pointer;transition:all .2s}
.manual-btn:hover{background:rgba(184,149,58,.25)}
.manual-btn.done{background:rgba(76,175,80,.12);border-color:#4caf50;color:#4caf50}

/* Toast */
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),#d4b86a);color:#1a0f0a;padding:.6rem 1.2rem;border-radius:8px;font-weight:700;font-size:.85rem;z-index:100;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:toastIn .3s}
.toast.show{display:block}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>

<div class="header">
  <h1>📷 AR扫描</h1>
  <p>对准AR卡片扫描，获取同步码到电脑端</p>
</div>

<div class="scanner" id="scanner">
  <video id="cam-video" autoplay playsinline></video>
  <canvas id="cam-canvas"></canvas>
  <div class="scan-overlay">
    <div class="scan-frame"><div class="scan-line"></div></div>
    <div class="scan-hint" id="scan-hint">将摄像头对准AR卡片</div>
  </div>
</div>

<!-- 手动扫描按钮（摄像头不可用时的备选） -->
<div style="padding:0 1rem;margin-bottom:.6rem">
  <div style="color:var(--gold);font-size:.82rem;font-weight:600;margin-bottom:.4rem">👆 点击已扫描到的卡片：</div>
  <div class="manual-scan" id="manual-btns"></div>
</div>

<div class="cards">
  <div class="cards-title">📋 AR卡片列表</div>
  <div class="card-grid" id="card-list"></div>
</div>

<div class="sync-section">
  <div class="sync-box">
    <div class="sync-label">🔑 同步码</div>
    <div class="sync-code" id="sync-code"><span class="sync-empty">扫描卡片后自动生成</span></div>
    <button class="sync-copy" id="sync-copy" disabled onclick="copySyncCode()">📋 复制同步码</button>
    <div class="sync-hint">将同步码输入到电脑端游戏 → AR联动 → 输入同步码</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// AR卡片数据
const AR_CARDS=[
  {id:'ar1',name:'虚拟磕头机（抽油机）',img:'images/drill.jpg',color:'#ff9800'},
  {id:'ar2',name:'虚拟井架模型',img:'images/core.jpg',color:'#4caf50'},
  {id:'ar3',name:'虚拟泥浆池',img:'images/battle.jpg',color:'#2196f3'},
  {id:'ar4',name:'铁人精神相关符号',img:'images/gandalai.jpg',color:'#9c27b0'},
  {id:'ar5',name:'建筑轮廓与纪念地标',img:'images/extra1.jpg',color:'#f44336'}
];

// 扫描状态
const scanned=new Set();
let cameraReady=false;
let scanTimer=null;

// 初始化
function init(){
  renderCards();
  renderManualBtns();
  startCamera();
}

// 渲染卡片列表
function renderCards(){
  const list=document.getElementById('card-list');
  list.innerHTML=AR_CARDS.map(c=>{
    const done=scanned.has(c.id);
    return `<div class="ar-card${done?' scanned':''}" onclick="manualScan('${c.id}')">
      <img class="ar-card-img" src="${c.img}" alt="${c.name}" onerror="this.style.background='${c.color}';this.style.display='flex'">
      <div class="ar-card-info">
        <div class="ar-card-name">${c.name}</div>
        <div class="ar-card-desc">${done?'✅ 已扫描':'点击手动标记为已扫描'}</div>
      </div>
      <div class="ar-card-status ${done?'done':'pending'}">${done?'✓':'待扫'}</div>
    </div>`;
  }).join('');
}

// 渲染手动扫描按钮
function renderManualBtns(){
  const box=document.getElementById('manual-btns');
  box.innerHTML=AR_CARDS.map((c,i)=>{
    const done=scanned.has(c.id);
    return `<button class="manual-btn${done?' done':''}" onclick="manualScan('${c.id}')">${done?'✓':''} 卡片${i+1}</button>`;
  }).join('');
}

// 手动标记扫描
function manualScan(id){
  if(scanned.has(id))return;
  scanned.add(id);
  const card=AR_CARDS.find(c=>c.id===id);
  showToast(`📷 扫描成功：${card.name}`);
  renderCards();
  renderManualBtns();
  updateSyncCode();
}

// 更新同步码
function updateSyncCode(){
  const codeEl=document.getElementById('sync-code');
  const copyBtn=document.getElementById('sync-copy');
  if(scanned.size===0){
    codeEl.innerHTML='<span class="sync-empty">扫描卡片后自动生成</span>';
    copyBtn.disabled=true;
    return;
  }
  // 生成同步码：AR-1-3-5 格式
  const nums=[...scanned].map(id=>{
    const idx=AR_CARDS.findIndex(c=>c.id===id);
    return idx+1;
  }).sort((a,b)=>a-b);
  const code='AR-'+nums.join('-');
  codeEl.textContent=code;
  copyBtn.disabled=false;
}

// 复制同步码
function copySyncCode(){
  const codeEl=document.getElementById('sync-code');
  const text=codeEl.textContent;
  if(!text||text.includes('扫描卡片'))return;
  navigator.clipboard.writeText(text).then(()=>{
    showToast('✅ 同步码已复制！');
  }).catch(()=>{
    // 降级方案
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 同步码已复制！');
  });
}

// 启动摄像头
async function startCamera(){
  const video=document.getElementById('cam-video');
  const hint=document.getElementById('scan-hint');
  const scanner=document.getElementById('scanner');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}
    });
    video.srcObject=stream;
    cameraReady=true;
    hint.textContent='将摄像头对准AR卡片';
    // 开始检测
    scanTimer=setInterval(detectMarker,800);
  }catch(e){
    console.log('摄像头不可用:',e);
    cameraReady=false;
    video.style.display='none';
    // 显示无摄像头提示
    const noCam=document.createElement('div');
    noCam.className='no-cam';
    noCam.innerHTML=`<p>📷 摄像头不可用<br>请点击下方卡片手动标记已扫描的AR卡片<br>然后复制同步码到电脑端</p>`;
    scanner.querySelector('.scan-overlay').style.display='none';
    video.parentNode.insertBefore(noCam,video.nextSibling);
  }
}

// 简单的AR标记检测（基于颜色特征）
// 由于没有真正的AR SDK，这里用颜色检测来模拟
// 每张卡片对应一个独特的颜色标记
function detectMarker(){
  if(!cameraReady)return;
  const video=document.getElementById('cam-video');
  const canvas=document.getElementById('cam-canvas');
  if(!video||video.readyState<2)return;

  canvas.width=160;canvas.height=120;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,160,120);

  // 采样中心区域的颜色
  const centerX=80,centerY=60,radius=20;
  const imageData=ctx.getImageData(centerX-radius,centerY-radius,radius*2,radius*2);
  const data=imageData.data;

  let rSum=0,gSum=0,bSum=0,count=0;
  for(let i=0;i<data.length;i+=4){
    rSum+=data[i];gSum+=data[i+1];bSum+=data[i+2];count++;
  }
  const rAvg=rSum/count,gAvg=gSum/count,bAvg=bSum/count;

  // 颜色匹配阈值
  const THRESHOLD=60;
  const markers=[
    {id:'ar1',r:255,g:152,b:0},    // 橙色 - 磕头机
    {id:'ar2',r:76,g:175,b:80},     // 绿色 - 井架
    {id:'ar3',r:33,g:150,b:243},    // 蓝色 - 泥浆池
    {id:'ar4',r:156,g:39,b:176},    // 紫色 - 铁人精神
    {id:'ar5',r:244,g:67,b:54}      // 红色 - 建筑
  ];

  for(const m of markers){
    if(scanned.has(m.id))continue;
    const dr=Math.abs(rAvg-m.r),dg=Math.abs(gAvg-m.g),db=Math.abs(bAvg-m.b);
    if(dr<THRESHOLD&&dg<THRESHOLD&&db<THRESHOLD){
      manualScan(m.id);
      break;
    }
  }
}

// Toast提示
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
